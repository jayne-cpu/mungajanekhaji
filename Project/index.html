<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Maker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Basic styling for the body to center content and provide a background */
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1 class="text-4xl font-bold mb-8 text-gray-800">Pixel Art Maker</h1>

    <div id="palette">
        <!-- Color options will be injected here by script.js -->
    </div>

    <div id="grid">
        <!-- Grid squares will be injected here by script.js -->
    </div>

    <button id="clear-btn" class="mt-6 px-6 py-2 bg-red-500 text-white rounded-md hover:bg-red-600 transition-colors shadow-md">
        Clear Grid
    </button>

    <!-- Link your script.js file here, preferably at the end of the body -->
    <script src="script.js"></script>
</body>
</html>
