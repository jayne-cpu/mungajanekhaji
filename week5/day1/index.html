<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>star wars app</title>
    <!-- FontAwesome (for spinner) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #000;
      color: #fff;
    }

    #card {
      margin: 20px auto;
      padding: 20px;
      border: 2px solid yellow;
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      background: yellow;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .spinner {
      font-size: 30px;
      margin: 20px;
    }
  </style>
</head>
<body>
     <h1>🌌 Star Wars Character</h1>

  <button id="btn">Get Random Character</button>

  <div id="card">
    <p>Click the button to load a character</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
